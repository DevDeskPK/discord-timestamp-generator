<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Timestamp Generator | Instant Copy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 p-5">
    <div class="max-w-2xl mx-auto bg-gray-800 p-6 rounded-2xl shadow-xl border border-gray-700">
        <h1 class="text-2xl font-bold text-indigo-400 mb-4">Discord Timestamp Generator</h1>
        
        <label class="block text-sm font-medium mb-2">Click on Calendar Icon, Select Date & Time on and copy Result through Copy Button</label>
        <input type="datetime-local" id="dateInput" 
               class="w-full p-3 rounded bg-gray-700 border border-gray-600 mb-6 focus:ring-2 focus:ring-indigo-500 outline-none">

        <div id="results" class="space-y-3">
            <!-- JavaScript will inject rows here -->
        </div>
    </div>

    <script>
        const dateInput = document.getElementById('dateInput');
        const resultsDiv = document.getElementById('results');

        // Set default time to "Now"
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        dateInput.value = now.toISOString().slice(0, 16);

        const formats = [
            { name: 'Relative', flag: 'R' },
            { name: 'Short Time', flag: 't' },
            { name: 'Long Time', flag: 'T' },
            { name: 'Short Date', flag: 'd' },
            { name: 'Long Date', flag: 'D' },
            { name: 'Short Date/Time', flag: 'f' },
            { name: 'Long Date/Time', flag: 'F' }
        ];

        function generate() {
            const unix = Math.floor(new Date(dateInput.value).getTime() / 1000);
            resultsDiv.innerHTML = '';

            if (isNaN(unix)) return;

            formats.forEach(f => {
                const code = `<t:${unix}:${f.flag}>`;
                
                const row = document.createElement('div');
                row.className = "flex flex-col sm:flex-row items-center justify-between bg-gray-900 p-3 rounded-lg border border-gray-700 gap-3";
                
                row.innerHTML = `
                    <div class="flex-1">
                        <span class="text-xs text-gray-400 uppercase font-bold">${f.name}</span>
                        <div class="text-indigo-300 font-mono text-sm truncate">${code}</div>
                    </div>
                    <button onclick="copyText('${code}', this)" 
                            class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded text-sm font-bold transition duration-200">
                        Copy
                    </button>
                `;
                resultsDiv.appendChild(row);
            });
        }

        function copyText(text, btn) {
            navigator.clipboard.writeText(text);
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            btn.classList.replace('bg-indigo-600', 'bg-green-600');
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.replace('bg-green-600', 'bg-indigo-600');
            }, 1500);
        }

        dateInput.addEventListener('input', generate);
        generate(); // Initial run
    </script>
</body>
<footer style="text-align: center; padding: 20px;">
    &copy;Discord Timestamp Generator
</footer>

</html>
